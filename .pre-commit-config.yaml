# cSpell:ignore checkmake hadolint autofix autoupdate
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^docs/cli-commands\.md$
      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md
        exclude_types: [rust]
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.1
    hooks:
      - id: prettier
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict, -c=.yamllint]
  - repo: https://github.com/editorconfig-checker/editorconfig-checker
    rev: v3.8.0
    hooks:
      - id: editorconfig-checker
  - repo: local
    hooks:
      - id: yaml-file-extension
        name: Check if YAML files has *.yaml extension.
        entry: YAML filenames must have .yaml extension.
        language: fail
        files: .yml$
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust files with rustfmt. Modifies files in place; re-stage after the hook runs.
        entry: cargo fmt --all
        language: system
        files: \.rs$
        pass_filenames: false
        require_serial: true
      # Runs only on `git push` (install with `prek install -t pre-push`).
      # Mirrors CI clippy so compile failures and lint regressions surface
      # locally instead of in CI. Skipped on pre-commit because it is too slow
      # for that stage.
      - id: cargo-clippy-push
        name: cargo clippy (pre-push)
        description: Catch clippy and compile failures before push.
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        files: (\.rs$|^Cargo\.toml$|^Cargo\.lock$)
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

when:
  - event: pull_request
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: push
    branch:
      - ${CI_REPO_DEFAULT_BRANCH}

labels:
  agent: thumper

steps:
  cache:
    image: codefloe.com/crow-plugins/sccache:0.2.4
    settings:
      s3-endpoint: https://s3.eu-central-003.backblazeb2.com
      s3-bucket: ricochet-sccache
      s3-region: eu-central-003
      s3-key-prefix: ${CI_REPO_NAME}
      s3-access-key:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: keyID
      s3-secret-key:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: applicationKey

  test:
    image: reg.ricochet.rs/docker.io/library/rust:1.95
    depends_on: cache
    environment:
      SQLX_OFFLINE: true
      GITHUB_TOKEN:
        from_secret: ricochet_bot_token
    commands:
      - export PATH=".sccache-cache:$PATH"
      - . ./.sccache
      # git auth
      - git config --global url."https://$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
      # test
      - cargo test -q --all-features --workspace

when:
  - event: pull_request
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: push
    branch:
      - ${CI_REPO_DEFAULT_BRANCH}

labels:
  type: static

steps:
  prek:
    image: reg.ricochet.rs/docker.io/library/alpine:3.24
    depends_on: []
    environment:
      PREK_VERSION: v0.3.9
      # cargo-fmt is a local-only auto-fix hook that needs the Rust toolchain,
      # which is absent in this minimal alpine image. The rust-lint step below
      # runs the equivalent `cargo fmt --check` with the real toolchain.
      SKIP: cargo-fmt
    commands:
      - apk add -q --no-cache curl git nodejs npm python3 py3-pip >/dev/null 2>&1
      - curl --proto '=https' --tlsv1.2 -LsSf https://github.com/j178/prek/releases/download/$$PREK_VERSION/prek-installer.sh | sh -s -- -q
      - $HOME/.local/bin/prek run -a

  cache:
    image: codefloe.com/crow-plugins/sccache:0.2.6
    settings:
      s3-endpoint: https://s3.eu-central-003.backblazeb2.com
      s3-bucket: ricochet-sccache
      s3-region: eu-central-003
      s3-key-prefix: ${CI_REPO_NAME}
      s3-access-key:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: keyID
      s3-secret-key:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: applicationKey

  rust-fmt:
    image: reg.ricochet.rs/docker.io/library/rust:1.97
    depends_on: cache
    commands:
      - export PATH=".sccache-cache:$PATH"
      - . ./.sccache
      - rustup component add rustfmt
      - cargo fmt -q --all
      - sccache --show-stats

  rust-lint:
    image: reg.ricochet.rs/docker.io/library/rust:1.97
    depends_on: cache
    environment:
      SQLX_OFFLINE: true
      GITHUB_TOKEN:
        from_secret: ricochet_bot_token
    commands:
      - export PATH=".sccache-cache:$PATH"
      - . ./.sccache
      # git auth
      - git config --global url."https://$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
      - rustup component add rustfmt clippy
      # Check formatting
      - cargo fmt --all -- --check
      # check clippy lints
      - cargo clippy --all-targets --all-features -- -D warnings
      - sccache --show-stats

  check-docs:
    image: reg.ricochet.rs/docker.io/library/rust:1.97
    depends_on: cache
    environment:
      GITHUB_TOKEN:
        from_secret: ricochet_bot_token
    commands:
      - export PATH=".sccache-cache:$PATH"
      - . ./.sccache
      # git auth
      - git config --global url."https://$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
      # Generate docs using the same command as 'just docs'
      - cargo run --quiet -- generate-docs > /tmp/cli-commands-generated.md 2>/dev/null || (echo "Failed to generate docs" && exit 1)
      # Check if docs are up-to-date
      - |
        if ! diff -q docs/cli-commands.md /tmp/cli-commands-generated.md > /dev/null 2>&1; then
          echo "❌ ERROR: CLI documentation is out of date!"
          echo ""
          echo "Run 'just docs' to update the documentation."
          echo ""
          echo "Differences:"
          diff -u docs/cli-commands.md /tmp/cli-commands-generated.md || true
          exit 1
        else
          echo "✓ CLI documentation is up-to-date"
        fi

  commitlint:
    when:
      - event: pull_request
      - event: pull_request_edited
    image: reg.ricochet.rs/docker.io/commitlint/commitlint:21.2.0
    commands:
      - echo $${CI_COMMIT_PULL_REQUEST_TITLE} | commitlint

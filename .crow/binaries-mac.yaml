when:
  - event: tag
  - event: deployment

labels:
  backend: local

matrix:
  include:
    - TARGET: macos-x86_64
    - TARGET: macos-arm64

steps:
  build:
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: ricochet_bot_token
      SCCACHE_DIR: /var/root/Library/Caches/Mozilla.sccache
    commands:
      # git auth
      - git config --global url."https://$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
      # Update Cargo.toml version from tag before building
      - |
        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          # Set up Rust environment (same as Justfile)
          if [ -d "/var/root/.cargo" ]; then
            export PATH="/var/root/.cargo/bin:$PATH"
            export CARGO_HOME="/var/root/.cargo"
            export RUSTUP_HOME="/var/root/.rustup"
          elif [ -d "$HOME/.cargo" ]; then
            export PATH="$HOME/.cargo/bin:$PATH"
            export CARGO_HOME="$HOME/.cargo"
            export RUSTUP_HOME="$HOME/.rustup"
          else
            echo "Error: Cannot find cargo installation"
            exit 1
          fi

          # Refresh the toolchain. The self-hosted runner's cargo can lag
          # behind upstream ricochet's manifest syntax (e.g. newlines in
          # inline tables), which fails to parse on older cargo. Linux/Windows
          # pin rust:1.96 via the image; here we update in place. rustup
          # re-adds the already-installed darwin targets on update.
          #
          # The macos-x86_64 and macos-arm64 matrix jobs share this runner's
          # RUSTUP_HOME, so running `rustup update` in both at once races on the
          # shared downloads dir (renaming a *.partial fails with ENOENT). macOS
          # has no flock, so serialize with an atomic mkdir spinlock; the second
          # job then finds the toolchain already current and is a fast no-op.
          LOCK=/tmp/ricochet-rustup-update.lock
          for _ in $(seq 1 180); do
            mkdir "$LOCK" 2>/dev/null && break
            sleep 2
          done
          trap 'rmdir "$LOCK" 2>/dev/null || true' EXIT
          rustup update stable
          rustup default stable
          rmdir "$LOCK" 2>/dev/null || true
          trap - EXIT

          VERSION="${CI_COMMIT_TAG#v}"
          echo "Updating Cargo.toml version to $VERSION"
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          # Sync only the ricochet-cli version in Cargo.lock; keep the pinned
          # ricochet-core git rev. `cargo generate-lockfile` would re-resolve
          # the unpinned git dep to upstream HEAD and drift off the tested
          # version (matches the Linux job in binaries.yaml).
          cargo update -p ricochet-cli
          echo "Updated Cargo.toml and Cargo.lock to version $VERSION"
          grep "^version" Cargo.toml
        fi
      # build
      - just build-static $TARGET
      - tree target/binaries/
      - |
        #!/bin/bash
        set -euo pipefail

        # Determine version string
        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          VERSION="${CI_COMMIT_TAG#v}"
        else
          # Use commit SHA if available, otherwise use date only
          if [ -n "${CI_COMMIT_SHA:-}" ]; then
            COMMIT_SHORT=$(echo "${CI_COMMIT_SHA}" | cut -c1-8)
            VERSION="$(date +%Y%m%d).$COMMIT_SHORT"
          else
            VERSION="$(date +%Y%m%d)"
          fi
        fi

        echo "VERSION: $VERSION"

        # Get macOS version for bottle naming
        MACOS_VERSION=$(sw_vers -productVersion | cut -d. -f1,2)
        case "$MACOS_VERSION" in
          15.*) MACOS_NAME="sequoia" ;;
          14.*) MACOS_NAME="sonoma" ;;
          13.*) MACOS_NAME="ventura" ;;
          12.*) MACOS_NAME="monterey" ;;
          *) MACOS_NAME="sequoia" ;;  # default to sequoia
        esac

        echo "MACOS_NAME: $MACOS_NAME"

        outdir="target/binaries/$VERSION"
        mkdir -p "$outdir"

        # Process each binary and create Homebrew-compatible bottles
        for file in target/binaries/ricochet-*; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")

            echo "Processing: $filename"

            # Determine architecture from filename
            case "$filename" in
              *arm64*)
                ARCH="arm64"
                ;;
              *x86_64*|*x86*)
                ARCH="x86_64"
                ;;
              *)
                echo "Unknown architecture for $filename"
                continue
                ;;
            esac

            echo "ARCH: $ARCH"

            # Simplify architecture naming for darwin
            case "$ARCH" in
              arm64)
                DARWIN_ARCH="arm64"
                ;;
              x86_64)
                DARWIN_ARCH="x86_64"
                ;;
            esac

            echo "DARWIN_ARCH: $DARWIN_ARCH"

            # Create Homebrew bottle structure: ricochet/{VERSION}/bin/ricochet
            # Use darwin-<arch> naming convention
            bottle_name=$(printf "ricochet-%s-darwin-%s" "$VERSION" "$DARWIN_ARCH")
            echo "Creating bottle: $bottle_name"

            bottle_dir="$outdir/$bottle_name"
            mkdir -p "$bottle_dir/ricochet/$VERSION/bin"

            # Copy binary into bottle structure
            cp "$file" "$bottle_dir/ricochet/$VERSION/bin/ricochet"
            chmod +x "$bottle_dir/ricochet/$VERSION/bin/ricochet"

            # Create the tarball (basename only, no directory structure)
            # Get absolute path for output since we're changing directories
            tarball_name="$bottle_name.tar.gz"
            abs_outdir=$(cd "$outdir" && pwd)
            (cd "$bottle_dir/ricochet/$VERSION/bin" && gtar -czf "$abs_outdir/$tarball_name" ricochet)

            # Clean up temporary bottle directory
            rm -rf "$bottle_dir"

            echo "Created bottle: $bottle_name.tar.gz"
          fi
        done

        # Clean up original binaries
        rm -f target/binaries/ricochet-*

        echo "Bottles created in: $outdir/"
        ls -lah "$outdir/"

        sccache -s

  'Upload to S3':
    image: bash
    environment:
      RCLONE_CONFIG_S3_TYPE: s3
      RCLONE_CONFIG_S3_PROVIDER: Minio
      RCLONE_CONFIG_S3_ENDPOINT: https://s3.eu-central-003.backblazeb2.com
      RCLONE_CONFIG_S3_REGION: eu-central-003
      RCLONE_CONFIG_S3_ACCESS_KEY_ID:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: keyID
      RCLONE_CONFIG_S3_SECRET_ACCESS_KEY:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: applicationKey
    depends_on:
      - build
    commands:
      - export VERSION=$(basename "$(ls -d target/binaries/*/ | head -1)")
      - rclone copyto target/binaries/$VERSION/ s3:ricochet-cli/v$VERSION/

when:
  - event: tag
  - event: deployment

labels:
  agent: thumper

steps:
  bump:
    image: reg.ricochet.rs/docker.io/library/rust:1.96-slim
    when:
      event: tag
    environment:
      GITHUB_TOKEN:
        from_secret: ricochet_bot_token
    commands:
      - apt-get update -q && apt-get install -y -q git sed
      # cargo update -p ricochet-cli verifies the pinned ricochet-core git rev,
      # which lives in a private repo — same auth shim as the build step.
      - git config --global url."https://$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
      - |
        set -euxo pipefail
        VERSION="${CI_COMMIT_TAG#v}"

        # Idempotent: sed is a no-op if the file is already at $VERSION.
        sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
        sed -i "s/\(RICOCHET_VERSION:-\)[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/\1$VERSION/" install.sh
        sed -i "s/\$Version = if (\$env:RICOCHET_VERSION) { \$env:RICOCHET_VERSION } else { \"[^\"]*\" }/\$Version = if (\$env:RICOCHET_VERSION) { \$env:RICOCHET_VERSION } else { \"$VERSION\" }/" install.ps1
        cargo update -p ricochet-cli

        git config user.name "ricochet-bot"
        git config user.email "droid@ricochet.rs"
        git add Cargo.toml Cargo.lock install.sh install.ps1
        if git diff --cached --quiet; then
          echo "==> Files already at v$VERSION; no bump commit needed"
        else
          git commit -m "chore: bump version to $VERSION"
          # Move the tag locally so 'build' picks up the bump commit and
          # 'Push bump and tag' has the right SHA to force-update on the remote.
          git tag -d "$CI_COMMIT_TAG"
          git tag "$CI_COMMIT_TAG" HEAD
          echo "==> Created bump commit and moved $CI_COMMIT_TAG to it"
        fi

  build:
    image: reg.ricochet.rs/docker.io/library/rust:1.96-slim
    depends_on:
      - bump
    environment:
      GITHUB_TOKEN:
        from_secret: ricochet_bot_token
    commands:
      - apt-get update && apt-get install -y just pkg-config musl-tools libssl-dev curl wget nodejs build-essential cmake ca-certificates musl-tools musl-dev gcc-aarch64-linux-gnu gcc-riscv64-linux-gnu gcc-mingw-w64 clang lld llvm tree git
      # git auth
      - git config --global url."https://$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
      # build sequentially to avoid file conflicts
      - just build-static linux-x86_64
      - just build-static linux-aarch64
      - just build-static windows-x86_64
      - tree target/binaries/
      - |
        # Determine version string
        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          VERSION="${CI_COMMIT_TAG#v}"
        else
          # Use commit SHA if available, otherwise use date only
          if [ -n "${CI_COMMIT_SHA:-}" ]; then
            COMMIT_SHORT=$(echo "${CI_COMMIT_SHA}" | cut -c1-8)
            VERSION="$(date +%Y%m%d).$COMMIT_SHORT"
          else
            VERSION="$(date +%Y%m%d)"
          fi
        fi

        outdir="target/binaries/v$VERSION"
        mkdir -p "$outdir"

        # Move, rename, and compress binary files with version
        for file in target/binaries/ricochet-*; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            arch=$(echo "$filename" | sed 's/^ricochet-//')

            new_name="ricochet-$VERSION-$arch"
            mv "$file" "$outdir/$new_name"
            echo -e "Moved $filename -> $new_name"

            # Compress this binary immediately
            (cd "$outdir" && tar -czvf "$new_name.tar.gz" "$new_name" --remove-files)
            echo -e "Compressed $new_name.tar.gz"
          fi
        done

        echo -e "All binaries processed in $outdir/"
        ls -la "$outdir/"

  'Push bump and tag':
    image: reg.ricochet.rs/docker.io/library/alpine:3.23
    when:
      event: tag
    depends_on:
      - build
    environment:
      SSH_KEY:
        from_secret: ricochet-bot-ssh-key
    commands:
      - apk add --no-cache -q git openssh-client
      - |
        set -euxo pipefail
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

        git config user.name "ricochet-bot"
        git config user.email "droid@ricochet.rs"
        git remote add origin-push git@github.com:ricochet-rs/cli.git
        git fetch origin-push main

        # If 'bump' didn't create a commit, nothing to push.
        if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin-push/main)" ]; then
          echo "==> No bump commit to push (Cargo.toml already at v${CI_COMMIT_TAG#v})"
          exit 0
        fi

        # Rebase the bump commit onto latest main (handles a race where main
        # advanced between the user's tag push and this step). Then push and
        # force-update the tag to the rebased bump commit.
        git rebase origin-push/main
        git push origin-push HEAD:main
        git tag -d "$CI_COMMIT_TAG"
        git tag "$CI_COMMIT_TAG" HEAD
        git push origin-push --force "$CI_COMMIT_TAG"
        echo "==> Pushed bump commit to main and force-updated $CI_COMMIT_TAG"

  'Upload to S3':
    image: reg.ricochet.rs/docker.io/woodpeckerci/plugin-s3:1.5.3
    depends_on:
      - build
    settings:
      acl: ''
      bucket: ricochet-cli
      region: eu-central-003
      endpoint: https://s3.eu-central-003.backblazeb2.com
      access_key:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: keyID
      secret_key:
        from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: applicationKey
      source: target/binaries/**/*
      strip_prefix: target/binaries/
      target: /

  changelog:
    image: reg.ricochet.rs/docker.io/thegeeklab/git-sv:2.1.1
    depends_on:
      - 'Push bump and tag'
    commands:
      - apk add --no-cache -q sed
      - git sv current-version
      - git sv release-notes -t ${CI_COMMIT_TAG} -o CHANGELOG.md
      - sed -i '1,2d' CHANGELOG.md # remove version
      - cat CHANGELOG.md
    when:
      event: tag

  'Create release':
    image: reg.ricochet.rs/docker.io/woodpeckerci/plugin-release:0.3.1
    depends_on:
      - changelog
    settings:
      note: CHANGELOG.md
      overwrite: true
      api_key:
        from_secret: ricochet_issue_token
      files:
        - target/binaries/**/*.tar.gz
      title: ${CI_COMMIT_TAG}
    when:
      event: tag

  'Trigger homebrew-tap update':
    image: reg.ricochet.rs/docker.io/library/alpine:3.23
    depends_on:
      - 'Push bump and tag'
    environment:
      GITHUB_TOKEN:
        from_secret: ricochet_bot_token
    commands:
      - apk add --no-cache -q curl
      - |
        HTTP_CODE=$(curl -s -o /tmp/dispatch-response.json -w '%{http_code}' -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/ricochet-rs/homebrew-tap/actions/workflows/update-formula.yml/dispatches \
          -d "{\"ref\":\"main\",\"inputs\":{\"version\":\"${CI_COMMIT_TAG}\"}}")
        if [ "$HTTP_CODE" -ne 204 ]; then
          echo "Error: GitHub dispatch returned HTTP $HTTP_CODE" >&2
          cat /tmp/dispatch-response.json >&2
          exit 1
        fi
        echo "==> Homebrew tap dispatch triggered for ${CI_COMMIT_TAG}"
    when:
      event: tag

[[repos]]
repo = "meta"
hooks = [
  { id = "check-hooks-apply" },
  { id = "check-useless-excludes" },
]

# Rust files are excluded from end-of-file-fixer and trailing-whitespace
# because rustfmt (the cargo-fmt hook + CI rust-lint) owns .rs whitespace and
# trailing newlines. eof-fixer in particular conflicts with rustfmt on empty
# module files (eof-fixer wants 0 bytes, rustfmt wants a single newline).
[[repos]]
repo = "builtin"
hooks = [
  { id = "end-of-file-fixer", exclude = "^docs/cli-commands\\.md$", exclude_types = [
    "rust",
  ] },
  { id = "trailing-whitespace", args = [
    "--markdown-linebreak-ext=md",
  ], exclude_types = [
    "rust",
  ] },
]

[[repos]]
repo = "https://github.com/DavidAnson/markdownlint-cli2"
rev = "v0.22.1"
hooks = [{ id = "markdownlint-cli2" }]

[[repos]]
repo = "https://github.com/rbubley/mirrors-prettier"
rev = "v3.9.1"
hooks = [{ id = "prettier" }]

[[repos]]
repo = "https://github.com/adrienverge/yamllint.git"
rev = "v1.38.0"
hooks = [{ id = "yamllint", args = ["--strict", "-c=.yamllint"] }]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker"
rev = "v3.8.0"
hooks = [{ id = "editorconfig-checker" }]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "yaml-file-extension"
name = "Check if YAML files has *.yaml extension."
entry = "YAML filenames must have .yaml extension."
language = "fail"
files = "\\.yml$"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
description = "Format Rust files with rustfmt. Modifies files in place; re-stage after the hook runs."
entry = "cargo fmt --all"
language = "system"
files = "\\.rs$"
pass_filenames = false
require_serial = true

# Runs only on `git push` (install with `prek install -t pre-push`).
# Mirrors the rust-lint CI step so compile failures and clippy regressions
# surface locally instead of in CI. Skipped on pre-commit because it is too
# slow for that stage.
[[repos.hooks]]
id = "cargo-clippy-push"
name = "cargo clippy (pre-push)"
description = "Catch clippy and compile failures before push."
entry = "cargo clippy --all-targets --all-features -- -D warnings"
language = "system"
files = "(\\.rs$|^Cargo\\.toml$|^Cargo\\.lock$)"
pass_filenames = false
require_serial = true
stages = ["pre-push"]
